<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Funk Strategy Game</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <h1>Funk Strategy Game</h1>
        <p>Browser UI with Funk gameplay logic.</p>
      </header>
      <main class="layout">
        <section class="board-panel">
          <canvas id="board" width="640" height="640"></canvas>
        </section>
        <aside class="sidebar">
          <div class="card">
            <h2>Status</h2>
            <p id="status">Scaffold ready.</p>
          </div>
          <div class="card">
            <h2>Selection</h2>
            <pre id="selection">Nothing selected.</pre>
          </div>
          <div class="card">
            <h2>Planned Boundary</h2>
            <pre id="contract">init_game()
selected_actions(state, x, y)
apply_action(state, action)
current_side(state)
game_status(state)
ai_pick_action(state)</pre>
          </div>
        </aside>
      </main>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
